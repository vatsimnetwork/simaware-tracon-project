name: Data check

on:
  pull_request:
  workflow_dispatch:

jobs:
  check-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install deps
        shell: sh
        working-directory: ./scripts
        run: yarn
      - name: Check schema
        shell: sh
        working-directory: ./scripts
        run: yarn validate-schema
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install deps
        shell: sh
        working-directory: ./scripts
        run: yarn
      - name: ESLint
        shell: sh
        working-directory: ./scripts
        run: yarn lint
      - name: Prettier (check)
        shell: sh
        working-directory: ./scripts
        run: yarn format:check
  validate-contributor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install deps
        shell: sh
        working-directory: ./scripts
        run: yarn
      - name: Check Boundaries.geojson
        shell: sh
        working-directory: ./scripts
        run: yarn check-contributor --login="${{ github.event.pull_request.user.login }}" --failWhenMissing
  compile-boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install deps
        shell: sh
        working-directory: ./scripts
        run: yarn
      - name: Compile boundaries
        shell: sh
        working-directory: ./scripts
        run: yarn compile
      - name: Upload compile artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TRACONBoundaries-pr-${{ github.event.pull_request.number || github.run_id }}
          path: |
            TRACONBoundaries.geojson
          if-no-files-found: error
          retention-days: 30
  enforce-dir-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Validate Directory Structure
        run: |
          echo "Validating directory structure..."
          for dir in Boundaries/*; do
            if [ -d "$dir" ]; then
              id=$(basename "$dir")
              json_files=("$dir"/*.json)
              if [ ${#json_files[@]} -eq 0 ]; then
                echo "::error file=$dir::No JSON files found in directory $dir"
                exit 1
              fi
              for json_file in "${json_files[@]}"; do
                if [[ ! "$json_file" =~ ^$dir/[^/]+\.json$ ]]; then
                  echo "::error file=$json_file::Invalid JSON file name or location: $json_file"
                  exit 1
                fi
              done
            else
              echo "::error file=$dir::Invalid directory: $dir"
              exit 1
            fi
          done
          echo "Directory structure is valid."
  validate-geometry-changed:
    # Enforces RFC 7946 + project geometry rules on files modified in this PR
    # only. Legacy violations on main are intentionally not blocked here; see
    # CONTRIBUTING.md and push.yml.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install deps
        shell: sh
        working-directory: ./scripts
        run: yarn
      - name: List changed boundary files
        id: changed
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          CHANGED=$(git diff --name-only --diff-filter=AM "origin/$BASE_REF"...HEAD -- 'Boundaries/**/*.json' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -z "$CHANGED" ]; then
            echo "No boundary files changed in this PR."
          else
            echo "Changed boundary files:"
            echo "$CHANGED"
          fi
      - name: Validate geometry on changed files
        if: steps.changed.outputs.files != ''
        shell: bash
        working-directory: ./scripts
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          printf '%s\n' "$CHANGED_FILES" | yarn --silent validate-geometry --changed-only
